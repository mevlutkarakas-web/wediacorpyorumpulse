services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yorum_pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yorum_pulse"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
volumes: { postgres_data: {} }
