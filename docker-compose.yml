services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yorum_pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yorum_pulse"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yorum_pulse?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/yorum_pulse?schema=public
    depends_on:
      postgres: { condition: service_healthy }
  worker:
    build: .
    command: npm run worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yorum_pulse?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/yorum_pulse?schema=public
      FACEBOOK_BROWSER_PATH: /usr/bin/chromium
    depends_on:
      postgres: { condition: service_healthy }
volumes: { postgres_data: {} }
